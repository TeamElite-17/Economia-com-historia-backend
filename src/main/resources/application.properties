# ========================================
# CONFIGURAÇÃO DA APLICAÇÃO
# ========================================
spring.application.name=economia-historia-api
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ========================================
# CONFIGURAÇÃO DO BANCO DE DADOS
# ========================================
# Dados de Conexão com o MySQL Local (Adaptável para a equipa)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/economia_historia_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# CONFIGURAÇÃO DO JPA/HIBERNATE
# ========================================
# Hibernate - Criação automática de tabelas para o MySQL
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.database=mysql

# ========================================
# CONFIGURAÇÃO DE LOGGING
# ========================================
logging.level.root=INFO
logging.level.com.isptec.economiahistoriaapi=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# CONFIGURAÇÃO DE VALIDAÇÃO
# ========================================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ========================================
# CONFIGURAÇÃO DE TIMEZONE
# ========================================
spring.jackson.time-zone=UTC

# ========================================
# CONFIGURAÇÃO JWT
# ========================================
jwt.secret=${JWT_SECRET:MudarEstaChaveSecretaEmProducaoComMinimoDeCharacteres32}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================================
# CONFIGURAÇÃO SWAGGER / OPENAPI
# ========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=false

# ========================================
# CONFIGURAÇÃO DE ENVIRONMENT
# ========================================
app.environment=${APP_ENVIRONMENT:development}
app.version=${APP_VERSION:1.0.0}

# ========================================
# CONFIGURAÇÃO DE UPLOAD DE FICHEIROS
# ========================================
# Diretório base para armazenar ficheiros de upload
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
# Tamanho máximo de ficheiro em MB
app.file.max-file-size=${MAX_FILE_SIZE:500}
# Tipos de ficheiro permitidos (vídeo, áudio, imagem)
app.file.allowed-video-types=video/mp4,video/quicktime,video/x-msvideo,video/x-matroska
app.file.allowed-audio-types=audio/mpeg,audio/mp4,audio/x-m4a,audio/ogg,audio/wav,audio/webm,audio/aac
app.file.allowed-image-types=image/jpeg,image/png,image/webp,image/gif
# Configuração Spring para upload de ficheiros
spring.servlet.multipart.max-file-size=${app.file.max-file-size}MB
spring.servlet.multipart.max-request-size=${app.file.max-file-size}MB

# ========================================
# CONFIGURAÇÃO DE EMAIL (GOOGLE SMTP)
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=economiacomhistoria@gmail.com
spring.mail.password=qgde gndc bake eugu
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000